<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ハロ！コン2026 トレードリスト作成</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: "Hiragino Kaku Gothic ProN", Meiryo, Arial, sans-serif; background:#000; color:#fff; margin:0; padding:16px; padding-bottom:180px; }
  h1 { font-size:18px; text-align:center; margin:4px 0 2px; }
  .sub { text-align:center; font-size:12px; color:#aaa; margin-bottom:14px; }

  .tabs { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:12px; }
  .tabs button {
    background:#1a1a1a; color:#ccc; border:1px solid #444; border-radius:16px;
    padding:6px 12px; font-size:12px; cursor:pointer;
  }
  .tabs button.active { background:#fff; color:#000; border-color:#fff; font-weight:bold; }

  .counts { text-align:center; font-size:12px; color:#aaa; margin-bottom:12px; }
  .counts .give-num { color:#6fdc8c; font-weight:bold; }
  .counts .want-num { color:#7ab8ff; font-weight:bold; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(84px, 1fr)); gap:10px; max-width:760px; margin:0 auto 24px; }
  .card { text-align:center; cursor:pointer; user-select:none; }
  .thumb {
    position:relative; width:100%; aspect-ratio:1/1; border-radius:8px;
    background-color:#111; background-size:contain; background-position:center; background-repeat:no-repeat;
    border:2px solid #333; transition:border-color .15s;
  }
  .card.state-give .thumb { border-color:#3ecf67; box-shadow:0 0 8px rgba(62,207,103,.5); }
  .card.state-want .thumb { border-color:#4a9eff; box-shadow:0 0 8px rgba(74,158,255,.5); }
  .rarity-badge {
    position:absolute; top:2px; left:2px; font-size:9px; font-weight:bold; padding:1px 5px; border-radius:6px;
    background:rgba(0,0,0,.75); color:#fff;
  }
  .rarity-badge.rarity-SR { color:#ffd24a; }
  .rarity-badge.rarity-R1, .rarity-badge.rarity-R2 { color:#7ab8ff; }
  .rarity-badge.rarity-N { color:#ccc; }
  .state-badge {
    position:absolute; bottom:2px; right:2px; font-size:10px; font-weight:bold; padding:1px 6px; border-radius:6px;
    color:#fff; display:none;
  }
  .card.state-give .state-badge { display:inline-block; background:#3ecf67; }
  .card.state-give .state-badge::after { content:"譲"; }
  .card.state-want .state-badge { display:inline-block; background:#4a9eff; }
  .card.state-want .state-badge::after { content:"求"; }
  .qty-badge {
    position:absolute; bottom:2px; left:2px; font-size:9px; font-weight:bold; padding:1px 5px; border-radius:6px;
    background:rgba(0,0,0,.75); color:#ffd24a;
  }
  .name { font-size:10px; margin-top:4px; line-height:1.3; color:#eee; }
  .qty-controls { display:flex; align-items:center; justify-content:center; gap:6px; margin-top:4px; }
  .qty-btn {
    width:20px; height:20px; line-height:18px; border-radius:50%; border:1px solid #555;
    background:#222; color:#fff; font-size:13px; cursor:pointer; padding:0;
  }
  .qty-btn:active { background:#444; }
  .qty-val { font-size:11px; min-width:16px; text-align:center; color:#fff; }

  .bottom-bar {
    position:fixed; bottom:0; left:0; width:100%; background:rgba(10,10,10,.97);
    border-top:1px solid #333; padding:10px 12px calc(10px + env(safe-area-inset-bottom));
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center; z-index:50;
  }
  .bottom-bar button {
    padding:9px 14px; font-size:13px; border-radius:8px; border:none; cursor:pointer; font-weight:bold;
  }
  #btnText { background:#fff; color:#000; }
  #btnImage { background:#4a9eff; color:#fff; }
  #btnResetGroup { background:#333; color:#ccc; }
  #btnResetAll { background:#3a1414; color:#ff8a8a; }

  #resultModal, #imageResultModal {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.85);
    align-items:center; justify-content:center; z-index:200; padding:16px;
  }
  #resultModal .modal-box, #imageResultModal .modal-box {
    background:#141414; border-radius:10px; padding:18px; width:100%; max-width:480px;
    max-height:85vh; overflow-y:auto;
  }
  #resultModal h3, #imageResultModal h3 { margin:0 0 10px; font-size:15px; }
  .name-mode-select { display:flex; gap:16px; margin-bottom:10px; font-size:13px; color:#ccc; }
  .name-mode-select label { display:flex; align-items:center; gap:4px; cursor:pointer; }
  #resultText {
    width:100%; height:220px; background:#000; color:#8fe0a4; font-size:12px;
    border:1px solid #444; border-radius:6px; padding:8px; resize:vertical; box-sizing:border-box;
    white-space:pre-wrap;
  }
  .image-modal-hint { font-size:12px; color:#aaa; margin:0 0 10px; }
  .image-preview-wrap img { width:100%; display:block; border-radius:8px; }
  .modal-actions { display:flex; gap:8px; margin-top:10px; justify-content:flex-end; flex-wrap:wrap; }
  .modal-actions button { padding:8px 14px; font-size:13px; border-radius:6px; border:none; cursor:pointer; }
  .modal-actions .copy-btn { background:#fff; color:#000; }
  .modal-actions .close-btn { background:#333; color:#ccc; }

  /* 画像書き出し用（画面には出さないオフスクリーン領域） */
  /* position:fixed だとスマホのブラウザでビジュアルビューポート基準になり幅が崩れることがあるため absolute にする */
  #imageExport {
    position:absolute; left:-9999px; top:0; width:900px; padding:28px;
    background:linear-gradient(160deg, #ffe1f0 0%, #fff3d6 30%, #d9f2ff 65%, #e3d9ff 100%);
    color:#3a2e42;
  }
  #imageExport h2 { font-size:20px; text-align:center; margin:0 0 4px; color:#5a3b7a; text-shadow:0 1px 2px rgba(255,255,255,.7); }
  #imageExport .date { text-align:center; font-size:12px; color:#6b5b73; margin-bottom:18px; }
  #imageExport .section-title { font-size:16px; font-weight:bold; margin:18px 0 10px; padding-left:8px; border-left:4px solid #333; }
  #imageExport .section-title.give { border-color:#1a8a4a; color:#1a8a4a; }
  #imageExport .section-title.want { border-color:#1f5fa8; color:#1f5fa8; }
  #imageExport .group-name { font-size:13px; color:#4a3b57; font-weight:bold; margin:12px 0 8px; }
  #imageExport .ex-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; }
  #imageExport .ex-card { text-align:center; }
  #imageExport .ex-thumb-wrap {
    position:relative; width:100%; aspect-ratio:1/1; border-radius:8px; overflow:hidden; background-color:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
    display:flex; align-items:center; justify-content:center;
  }
  /* html2canvas は object-fit を正しく描画できないため、max-width/max-height + flex中央寄せで縦横比を保つ */
  #imageExport .ex-thumb { max-width:100%; max-height:100%; width:auto; height:auto; display:block; }
  #imageExport .ex-qty-badge {
    position:absolute; top:4px; right:4px; background:rgba(0,0,0,.8); color:#ffd24a;
    font-size:12px; font-weight:bold; padding:2px 7px; border-radius:6px;
  }
  #imageExport .ex-name { font-size:11px; margin-top:5px; color:#3a2e42; font-weight:bold; line-height:1.3; }
  #imageExport .empty { text-align:center; color:#8a7a90; font-size:12px; padding:10px 0; }
</style>
</head>
<body>

<h1>✨ハロ！コン2026 トレードリスト作成✨</h1>
<div class="sub">カードをタップ：未設定 → 譲 → 求 → 未設定　の順で切り替わります（＋／－で個数を設定できます）</div>

<div class="tabs" id="tabs"></div>
<div class="counts" id="counts"></div>
<div class="grid" id="grid"></div>

<div class="bottom-bar">
  <button id="btnText">📋 テキストで作成</button>
  <button id="btnImage">🖼 画像で保存</button>
  <button id="btnResetGroup">このグループをリセット</button>
  <button id="btnResetAll">全てリセット</button>
</div>

<div id="resultModal">
  <div class="modal-box">
    <h3>譲/求リスト（テキスト）</h3>
    <div class="name-mode-select">
      <label><input type="radio" name="nameMode" value="full" checked> フルネーム</label>
      <label><input type="radio" name="nameMode" value="surname"> 苗字のみ</label>
    </div>
    <textarea id="resultText" readonly></textarea>
    <div class="modal-actions">
      <button class="copy-btn" id="copyTextBtn">コピー</button>
      <button class="close-btn" id="closeModalBtn">閉じる</button>
    </div>
  </div>
</div>

<div id="imageResultModal">
  <div class="modal-box">
    <h3>トレードリスト画像</h3>
    <p class="image-modal-hint">画像を長押しすると保存できます</p>
    <div class="image-preview-wrap"><img id="imageResultPreview" alt="トレードリスト画像"></div>
    <div class="modal-actions">
      <button class="copy-btn" id="shareImageBtn">共有 / 保存</button>
      <button class="close-btn" id="closeImageModalBtn">閉じる</button>
    </div>
  </div>
</div>

<div id="imageExport"></div>

<script>
  // グループタブはモーニング娘から始まり結成順に並べる
  const GROUPS = {
    "モーニング娘":       { folder:"モーニング娘",       members:["野中美希","小田さくら","岡村ほまれ","山﨑愛生","櫻井梨央","井上春華","弓桁朱琴","杉原明紗"] },
    "アンジュルム":       { folder:"アンジュルム",       members:["伊勢鈴蘭","橋迫鈴","川名凜","為永幸音","松本わかな","平山遊季","下井谷幸穂","後藤花","長野桃羽"] },
    "Juice=Juice":       { folder:"Juice=Juice",       members:["段原瑠々","井上玲音","工藤由愛","松永里愛","有澤一華","入江里咲","江端妃咲","石山咲良","遠藤彩加里","川嶋美楓","林仁愛"] },
    "つばきファクトリー": { folder:"つばきファクトリー", members:["谷本安美","小野瑞歩","小野田紗栞","秋山眞緒","河西結心","福田真琳","豫風瑠乃","石井泉羽","村田結生","土居楓奏","西村乙輝"] },
    "BEYOOOOOONDS":     { folder:"BEYOOOOOONDS",     members:["西田汐里","江口紗耶","前田こころ","岡村美波","清野桃々姫","平井美葉","小林萌花","里吉うたの"] },
    "OCHA NORMA":        { folder:"OCHA NORMA",        members:["斉藤円香","広本瑠璃","米村姫良々","窪田七海","中山夏月姫","西﨑美空","北原もも","筒井澪心"] },
    "ロージークロニクル": { folder:"ロージークロニクル", members:["橋田歩果","吉田姫杷","小野田華凜","村越彩菜","植村葉純","松原ユリヤ","島川波菜","上村麗菜","相馬優芽"] }
  };

  const ITEM_TYPES = [
    { rarity:"SR", name:"ソロうちわ" },
    { rarity:"R2", name:"ミニ巾着" },
    { rarity:"R1", name:"目印マーカー" },
    { rarity:"N",  name:"缶バッジ" }
  ];

  function buildItems(groupKey){
    const g = GROUPS[groupKey];
    const list = [];
    // レアリティ（SR→R2→R1→N）＞名前（元画像の通し番号順）で並べる
    ITEM_TYPES.forEach(t => {
      g.members.forEach((member, i) => {
        const num = String(i + 1).padStart(3, "0");
        const file = `[${t.rarity}]${t.name}${num}${member}.png`;
        list.push({ rarity:t.rarity, itemName:t.name, member, file, path:`${g.folder}/${file}` });
      });
    });
    return list;
  }

  const ITEMS_BY_GROUP = {};
  Object.keys(GROUPS).forEach(k => { ITEMS_BY_GROUP[k] = buildItems(k); });

  function encodePath(path){
    return path.split("/").map(encodeURIComponent).join("/");
  }

  // 内部の並び替え・状態管理には "R1"/"R2" のまま使うが、画面表示では数字を省いて "R" とする
  function displayRarity(rarity){
    return rarity.replace(/^R[12]$/, "R");
  }

  // テキスト作成で「苗字のみ」を選んだ時に使う、フルネーム→苗字の対応表
  const SURNAME_MAP = {
    "野中美希":"野中", "小田さくら":"小田", "岡村ほまれ":"岡村", "山﨑愛生":"山﨑",
    "櫻井梨央":"櫻井", "井上春華":"井上", "弓桁朱琴":"弓桁", "杉原明紗":"杉原",
    "伊勢鈴蘭":"伊勢", "為永幸音":"為永", "橋迫鈴":"橋迫", "川名凜":"川名",
    "松本わかな":"松本", "平山遊季":"平山", "下井谷幸穂":"下井谷", "後藤花":"後藤", "長野桃羽":"長野",
    "段原瑠々":"段原", "井上玲音":"井上", "工藤由愛":"工藤", "松永里愛":"松永",
    "有澤一華":"有澤", "入江里咲":"入江", "江端妃咲":"江端", "石山咲良":"石山",
    "遠藤彩加里":"遠藤", "川嶋美楓":"川嶋", "林仁愛":"林",
    "谷本安美":"谷本", "小野瑞歩":"小野", "小野田紗栞":"小野田", "秋山眞緒":"秋山",
    "河西結心":"河西", "福田真琳":"福田", "豫風瑠乃":"豫風", "石井泉羽":"石井",
    "村田結生":"村田", "土居楓奏":"土居", "西村乙輝":"西村",
    "西田汐里":"西田", "江口紗耶":"江口", "前田こころ":"前田", "岡村美波":"岡村",
    "清野桃々姫":"清野", "平井美葉":"平井", "小林萌花":"小林", "里吉うたの":"里吉",
    "斉藤円香":"斉藤", "広本瑠璃":"広本", "米村姫良々":"米村", "窪田七海":"窪田",
    "中山夏月姫":"中山", "西﨑美空":"西﨑", "北原もも":"北原", "筒井澪心":"筒井",
    "橋田歩果":"橋田", "吉田姫杷":"吉田", "小野田華凜":"小野田", "村越彩菜":"村越",
    "植村葉純":"植村", "松原ユリヤ":"松原", "島川波菜":"島川", "上村麗菜":"上村", "相馬優芽":"相馬"
  };

  function displayMember(member, nameMode){
    return nameMode === "surname" ? (SURNAME_MAP[member] || member) : member;
  }

  const STORAGE_KEY = "halocon2026-trade-list";

  function loadState(){
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (saved && typeof saved === "object"){
        // 過去バージョン（値が "give"/"want" の文字列）を { type, qty:1 } へ変換する
        Object.keys(saved).forEach(k => {
          if (typeof saved[k] === "string") saved[k] = { type: saved[k], qty: 1 };
        });
        return saved;
      }
    } catch (e) {}
    return {};
  }

  function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

  let state = loadState(); // key: "グループ名::ファイル名" -> { type:"give"|"want", qty:number }
  let currentGroup = Object.keys(GROUPS)[0];

  const tabsEl   = document.getElementById("tabs");
  const gridEl   = document.getElementById("grid");
  const countsEl = document.getElementById("counts");

  function keyOf(groupKey, file){ return `${groupKey}::${file}`; }

  function getState(k){ return state[k] || { type:"none", qty:0 }; }

  function setState(k, type, qty){
    if (type === "none" || qty <= 0) delete state[k];
    else state[k] = { type, qty };
    saveState();
  }

  function cycleState(k){
    const cur = getState(k);
    const next = cur.type === "none" ? "give" : cur.type === "give" ? "want" : "none";
    setState(k, next, next === "none" ? 0 : 1);
    renderGrid();
    renderCounts();
  }

  function changeQty(k, delta){
    const cur = getState(k);
    if (cur.type === "none") return;
    setState(k, cur.type, cur.qty + delta);
    renderGrid();
    renderCounts();
  }

  function renderTabs(){
    tabsEl.innerHTML = Object.keys(GROUPS).map(g =>
      `<button data-group="${g}" class="${g === currentGroup ? "active" : ""}">${g}</button>`
    ).join("");
    tabsEl.querySelectorAll("button").forEach(btn => {
      btn.addEventListener("click", () => {
        currentGroup = btn.dataset.group;
        renderTabs();
        renderGrid();
        renderCounts();
      });
    });
  }

  function renderGrid(){
    const items = ITEMS_BY_GROUP[currentGroup];
    gridEl.innerHTML = items.map(item => {
      const k = keyOf(currentGroup, item.file);
      const st = getState(k);
      const qtyControls = st.type !== "none" ? `
        <div class="qty-controls">
          <button class="qty-btn qty-minus" data-key="${k}">−</button>
          <span class="qty-val">${st.qty}</span>
          <button class="qty-btn qty-plus" data-key="${k}">＋</button>
        </div>` : "";
      const qtyBadge = st.qty > 1 ? `<span class="qty-badge">×${st.qty}</span>` : "";
      return `<div class="card state-${st.type}" data-key="${k}">
        <div class="thumb" style="background-image:url('${encodePath(item.path)}')">
          <span class="rarity-badge rarity-${item.rarity}">${displayRarity(item.rarity)}</span>
          <span class="state-badge"></span>
          ${qtyBadge}
        </div>
        <div class="name">${item.member}<br>${item.itemName}</div>
        ${qtyControls}
      </div>`;
    }).join("");
  }

  gridEl.addEventListener("click", (e) => {
    const minusBtn = e.target.closest(".qty-minus");
    const plusBtn  = e.target.closest(".qty-plus");
    const card     = e.target.closest(".card");
    if (!card) return;
    const k = card.dataset.key;
    if (minusBtn){ changeQty(k, -1); return; }
    if (plusBtn){ changeQty(k, 1); return; }
    cycleState(k);
  });

  function renderCounts(){
    let giveTotal = 0, wantTotal = 0, giveHere = 0, wantHere = 0;
    Object.entries(state).forEach(([k, s]) => {
      if (s.type === "give") giveTotal += s.qty; else if (s.type === "want") wantTotal += s.qty;
      if (k.startsWith(currentGroup + "::")){
        if (s.type === "give") giveHere += s.qty; else if (s.type === "want") wantHere += s.qty;
      }
    });
    countsEl.innerHTML =
      `このグループ　譲:<span class="give-num">${giveHere}</span>　求:<span class="want-num">${wantHere}</span>　` +
      `｜　全体　譲:<span class="give-num">${giveTotal}</span>　求:<span class="want-num">${wantTotal}</span>`;
  }

  function collectByGroup(kind){
    const result = {}; // groupKey -> [item(+qty)]
    Object.keys(GROUPS).forEach(g => {
      const list = ITEMS_BY_GROUP[g]
        .map(item => ({ item, s: getState(keyOf(g, item.file)) }))
        .filter(({ s }) => s.type === kind)
        .map(({ item, s }) => ({ ...item, qty: s.qty }));
      if (list.length) result[g] = list;
    });
    return result;
  }

  // 同じグッズ種類ごとにまとめて「グッズ名」の行→対象メンバーを空白区切りで並べた行、を出力する
  function appendByType(lines, items, nameMode){
    ITEM_TYPES.forEach(t => {
      const list = items.filter(it => it.itemName === t.name);
      if (!list.length) return;
      lines.push(t.name);
      lines.push(list.map(it => displayMember(it.member, nameMode) + (it.qty > 1 ? "×" + it.qty : "")).join(" "));
    });
  }

  function generateText(nameMode){
    const gives = collectByGroup("give");
    const wants = collectByGroup("want");
    const groupsWithData = [...new Set([...Object.keys(gives), ...Object.keys(wants)])];

    if (groupsWithData.length === 0){
      return "まだ譲・求のカードが選択されていません。\nカード画像をタップして選んでください。";
    }

    const lines = ["モバガチャ　ハロコン2026", ""];
    // GROUPS の並び順で出力する
    Object.keys(GROUPS).forEach(g => {
      if (!gives[g] && !wants[g]) return;
      lines.push(`■${g}`);
      if (gives[g]){
        lines.push("譲)");
        appendByType(lines, gives[g], nameMode);
      }
      if (wants[g]){
        lines.push("求)");
        appendByType(lines, wants[g], nameMode);
      }
      lines.push("");
    });
    return lines.join("\n").trim();
  }

  function currentNameMode(){
    const checked = document.querySelector('input[name="nameMode"]:checked');
    return checked ? checked.value : "full";
  }

  document.getElementById("btnText").addEventListener("click", () => {
    document.getElementById("resultText").value = generateText(currentNameMode());
    document.getElementById("resultModal").style.display = "flex";
  });

  document.querySelectorAll('input[name="nameMode"]').forEach(radio => {
    radio.addEventListener("change", () => {
      document.getElementById("resultText").value = generateText(currentNameMode());
    });
  });

  document.getElementById("copyTextBtn").addEventListener("click", () => {
    const ta = document.getElementById("resultText");
    ta.select();
    if (navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(ta.value);
    } else {
      document.execCommand("copy");
    }
  });

  document.getElementById("closeModalBtn").addEventListener("click", () => {
    document.getElementById("resultModal").style.display = "none";
  });

  document.getElementById("btnResetGroup").addEventListener("click", () => {
    if (!confirm(`「${currentGroup}」の譲・求の選択をリセットします。よろしいですか？`)) return;
    Object.keys(state).forEach(k => {
      if (k.startsWith(currentGroup + "::")) delete state[k];
    });
    saveState();
    renderGrid();
    renderCounts();
  });

  document.getElementById("btnResetAll").addEventListener("click", () => {
    if (!confirm("すべてのグループの譲・求の選択をリセットします。よろしいですか？")) return;
    state = {};
    saveState();
    renderGrid();
    renderCounts();
  });

  function buildExportSection(kind, label, cls){
    const byGroup = collectByGroup(kind);
    const groupsWithData = Object.keys(GROUPS).filter(g => byGroup[g]);
    let html = `<div class="section-title ${cls}">${label}</div>`;
    if (groupsWithData.length === 0){
      html += `<div class="empty">（なし）</div>`;
      return html;
    }
    groupsWithData.forEach(g => {
      html += `<div class="group-name">${g}</div><div class="ex-grid">`;
      byGroup[g].forEach(it => {
        const qtyBadge = it.qty > 1 ? `<span class="ex-qty-badge">×${it.qty}</span>` : "";
        html += `<div class="ex-card">
          <div class="ex-thumb-wrap">
            <img class="ex-thumb" src="${encodePath(it.path)}" alt="">
            ${qtyBadge}
          </div>
          <div class="ex-name">${displayRarity(it.rarity)} ${it.member}<br>${it.itemName}</div>
        </div>`;
      });
      html += `</div>`;
    });
    return html;
  }

  // 生成した画像のBlob/URLはここに保持し、共有ボタンを押した時（別のクリック）に使う。
  // navigator.share()はhtml2canvasの完了を待った後に呼ぶとユーザー操作の文脈が切れて
  // iOS Safariで失敗する（NotAllowedError）ため、画像生成と共有を別のクリックに分けている。
  let lastExportBlob = null;
  let lastExportUrl = null;

  document.getElementById("btnImage").addEventListener("click", async () => {
    const exportEl = document.getElementById("imageExport");
    const today = new Date();
    const dateStr = `${today.getFullYear()}/${today.getMonth() + 1}/${today.getDate()}`;

    exportEl.innerHTML =
      `<h2>✨ハロ！コン2026 トレードリスト✨</h2>` +
      `<div class="date">${dateStr}</div>` +
      buildExportSection("give", "譲ります", "give") +
      buildExportSection("want", "求めます", "want");

    const btn = document.getElementById("btnImage");
    btn.disabled = true;
    const originalLabel = btn.innerText;
    btn.innerText = "作成中...";

    try {
      const canvas = await html2canvas(exportEl, { backgroundColor: "#ffe1f0", scale: 3 });
      const blob = await new Promise(resolve => canvas.toBlob(resolve, "image/png"));

      if (lastExportUrl) URL.revokeObjectURL(lastExportUrl);
      lastExportBlob = blob;
      lastExportUrl = URL.createObjectURL(blob);

      document.getElementById("imageResultPreview").src = lastExportUrl;
      document.getElementById("imageResultModal").style.display = "flex";
    } catch (e) {
      alert("画像の作成に失敗しました。");
    } finally {
      btn.disabled = false;
      btn.innerText = originalLabel;
    }
  });

  document.getElementById("shareImageBtn").addEventListener("click", async () => {
    if (!lastExportBlob || !lastExportUrl) return;
    const file = new File([lastExportBlob], "halocon2026-trade-list.png", { type: "image/png" });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })){
      try {
        await navigator.share({ files: [file], title: "モバガチャ　ハロコン2026" });
        return;
      } catch (shareErr) {
        if (shareErr.name === "AbortError") return; // ユーザーがキャンセルした場合は何もしない
        // 共有に失敗した場合は下のダウンロードにフォールバックする
      }
    }

    const a = document.createElement("a");
    a.href = lastExportUrl;
    a.download = "halocon2026-trade-list.png";
    a.click();
  });

  document.getElementById("closeImageModalBtn").addEventListener("click", () => {
    document.getElementById("imageResultModal").style.display = "none";
  });

  renderTabs();
  renderGrid();
  renderCounts();
</script>

</body>
</html>
